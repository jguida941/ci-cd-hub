name: AI CI Loop

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Maximum fix iterations"
        default: "5"
        type: string
      fix_mode:
        description: "Fix strategy"
        type: choice
        default: "safe"
        options:
          - safe
          - report-only

permissions:
  contents: read

jobs:
  ai-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install cihub
        run: python -m pip install -e ".[ci]"

      - name: Run AI CI loop
        env:
          CIHUB_EMIT_TRIAGE: "true"
        run: cihub ai-loop --max-iterations "${{ inputs.max_iterations }}" --fix-mode "${{ inputs.fix_mode }}"
